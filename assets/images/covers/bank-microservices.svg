<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbf5"/>
      <stop offset="100%" stop-color="#dcf2dd"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#65a30d"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#16a34a" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <text x="80" y="180" font-family="ui-monospace, JetBrains Mono, monospace" font-size="20" font-weight="700" fill="#65a30d" letter-spacing="3">// MICROSERVICES</text>
  <text x="80" y="295" font-family="ui-sans-serif, system-ui, sans-serif" font-size="92" font-weight="900" fill="url(#g)" letter-spacing="-2">Bank App</text>
  <text x="80" y="355" font-family="ui-monospace, JetBrains Mono, monospace" font-size="24" fill="#3a5a44">Spring Cloud · Eureka · API Gateway</text>

  <!-- Service mesh grid illustration -->
  <g transform="translate(760, 200)" opacity="0.9">
    <!-- Top row services -->
    <rect x="0" y="0" width="140" height="90" rx="14" fill="none" stroke="url(#g)" stroke-width="7"/>
    <text x="70" y="38" font-family="ui-monospace, monospace" font-size="13" fill="#16a34a" text-anchor="middle" font-weight="700">Account</text>
    <text x="70" y="56" font-family="ui-monospace, monospace" font-size="13" fill="#65a30d" text-anchor="middle">Service</text>
    <circle cx="70" cy="74" r="6" fill="#16a34a"/>

    <rect x="180" y="0" width="140" height="90" rx="14" fill="none" stroke="url(#g)" stroke-width="7"/>
    <text x="250" y="38" font-family="ui-monospace, monospace" font-size="13" fill="#16a34a" text-anchor="middle" font-weight="700">Transfer</text>
    <text x="250" y="56" font-family="ui-monospace, monospace" font-size="13" fill="#65a30d" text-anchor="middle">Service</text>
    <circle cx="250" cy="74" r="6" fill="#16a34a"/>

    <rect x="360" y="0" width="140" height="90" rx="14" fill="none" stroke="url(#g)" stroke-width="7"/>
    <text x="430" y="38" font-family="ui-monospace, monospace" font-size="13" fill="#16a34a" text-anchor="middle" font-weight="700">Notification</text>
    <text x="430" y="56" font-family="ui-monospace, monospace" font-size="13" fill="#65a30d" text-anchor="middle">Service</text>
    <circle cx="430" cy="74" r="6" fill="#16a34a"/>

    <!-- Connecting lines between top services -->
    <line x1="140" y1="45" x2="180" y2="45" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
    <line x1="320" y1="45" x2="360" y2="45" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>

    <!-- Down arrows to bottom row -->
    <line x1="70" y1="90" x2="70" y2="130" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
    <line x1="250" y1="90" x2="250" y2="130" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
    <line x1="430" y1="90" x2="430" y2="130" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>

    <!-- Bottom row services -->
    <rect x="0" y="130" width="140" height="90" rx="14" fill="none" stroke="url(#g)" stroke-width="7"/>
    <text x="70" y="168" font-family="ui-monospace, monospace" font-size="13" fill="#16a34a" text-anchor="middle" font-weight="700">Eureka</text>
    <text x="70" y="186" font-family="ui-monospace, monospace" font-size="13" fill="#65a30d" text-anchor="middle">Registry</text>
    <circle cx="70" cy="204" r="6" fill="#65a30d"/>

    <rect x="180" y="130" width="140" height="90" rx="14" fill="none" stroke="url(#g)" stroke-width="7"/>
    <text x="250" y="168" font-family="ui-monospace, monospace" font-size="13" fill="#16a34a" text-anchor="middle" font-weight="700">API</text>
    <text x="250" y="186" font-family="ui-monospace, monospace" font-size="13" fill="#65a30d" text-anchor="middle">Gateway</text>
    <circle cx="250" cy="204" r="6" fill="#65a30d"/>

    <rect x="360" y="130" width="140" height="90" rx="14" fill="none" stroke="url(#g)" stroke-width="7"/>
    <text x="430" y="168" font-family="ui-monospace, monospace" font-size="13" fill="#16a34a" text-anchor="middle" font-weight="700">Config</text>
    <text x="430" y="186" font-family="ui-monospace, monospace" font-size="13" fill="#65a30d" text-anchor="middle">Server</text>
    <circle cx="430" cy="204" r="6" fill="#65a30d"/>

    <!-- Connecting lines between bottom services -->
    <line x1="140" y1="175" x2="180" y2="175" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
    <line x1="320" y1="175" x2="360" y2="175" stroke="#16a34a" stroke-width="3" stroke-dasharray="6,4" opacity="0.7"/>
  </g>
</svg>
