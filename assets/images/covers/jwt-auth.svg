<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbf5"/>
      <stop offset="100%" stop-color="#dcf2dd"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#65a30d"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#16a34a" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <text x="80" y="180" font-family="ui-monospace, JetBrains Mono, monospace" font-size="20" font-weight="700" fill="#65a30d" letter-spacing="3">// SECURE AUTH</text>
  <text x="80" y="285" font-family="ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="900" fill="url(#g)" letter-spacing="-2">JWT Auth</text>
  <text x="80" y="370" font-family="ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="900" fill="url(#g)" letter-spacing="-2">Spring Boot</text>
  <text x="80" y="430" font-family="ui-monospace, JetBrains Mono, monospace" font-size="24" fill="#3a5a44">Stateless · refresh tokens · RBAC</text>

  <!-- Shield with lock illustration -->
  <g transform="translate(960, 240)" opacity="0.92">
    <!-- Shield outline -->
    <path d="M 0 -10 L 110 -40 L 220 -10 L 220 140 Q 220 240 110 280 Q 0 240 0 140 Z" fill="none" stroke="url(#g)" stroke-width="9" stroke-linejoin="round"/>
    <!-- Shield inner glow fill -->
    <path d="M 14 2 L 110 -26 L 206 2 L 206 140 Q 206 226 110 264 Q 14 226 14 140 Z" fill="#16a34a" opacity="0.07"/>
    <!-- Padlock body -->
    <rect x="64" y="130" width="92" height="88" rx="10" fill="none" stroke="url(#g)" stroke-width="8"/>
    <!-- Padlock shackle -->
    <path d="M 84 130 L 84 104 Q 84 76 110 76 Q 136 76 136 104 L 136 130" fill="none" stroke="url(#g)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Keyhole -->
    <circle cx="110" cy="170" r="12" fill="#16a34a" opacity="0.8"/>
    <rect x="104" y="178" width="12" height="22" rx="3" fill="#16a34a" opacity="0.8"/>
  </g>

  <!-- JWT token dots (header.payload.signature) -->
  <g transform="translate(810, 520)" opacity="0.75">
    <rect x="-10" y="-18" width="80" height="36" rx="8" fill="#16a34a" opacity="0.2"/>
    <text x="30" y="5" font-family="ui-monospace, monospace" font-size="14" fill="#16a34a" text-anchor="middle" font-weight="700">header</text>
    <text x="85" y="5" font-family="ui-monospace, monospace" font-size="18" fill="#65a30d" text-anchor="middle" font-weight="900">.</text>
    <rect x="96" y="-18" width="90" height="36" rx="8" fill="#65a30d" opacity="0.2"/>
    <text x="141" y="5" font-family="ui-monospace, monospace" font-size="14" fill="#65a30d" text-anchor="middle" font-weight="700">payload</text>
    <text x="202" y="5" font-family="ui-monospace, monospace" font-size="18" fill="#0d9488" text-anchor="middle" font-weight="900">.</text>
    <rect x="212" y="-18" width="96" height="36" rx="8" fill="#0d9488" opacity="0.2"/>
    <text x="260" y="5" font-family="ui-monospace, monospace" font-size="13" fill="#0d9488" text-anchor="middle" font-weight="700">signature</text>
  </g>
</svg>
