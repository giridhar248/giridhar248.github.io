<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Giridhar Reddy Mekapothula — Software Engineer building distributed systems, AI agents, and backend services." />
    <meta name="author" content="Giridhar Reddy Mekapothula" />
    <meta name="keywords" content="Giridhar Reddy, Software Engineer, Distributed Systems, AI Agents, Java, Python, Backend, Portfolio" />
    <meta name="theme-color" content="#07070b" />
    <title>Giridhar Reddy Mekapothula — Software Engineer</title>

    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              bg: '#07070b',
              surface: '#0e0e14',
              'surface-2': '#16161e',
              border: 'rgba(255,255,255,0.06)',
              'text-hi': '#f4f4f5',
              'text-mid': '#a1a1aa',
              'text-lo': '#71717a',
              'accent-1': '#8b5cf6',
              'accent-2': '#22d3ee',
              'accent-3': '#f472b6',
            },
            fontFamily: {
              sans: ['ui-sans-serif', 'system-ui', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
              mono: ['ui-monospace', 'JetBrains Mono', 'Menlo', 'Consolas', 'monospace'],
            },
            fontSize: {
              display: ['clamp(2.75rem, 6vw, 5.25rem)', { lineHeight: '1.05', letterSpacing: '-0.02em' }],
              h2: ['clamp(2rem, 3.5vw, 2.75rem)', { lineHeight: '1.15', letterSpacing: '-0.01em' }],
              eyebrow: ['0.75rem', { letterSpacing: '0.18em' }],
            },
            backgroundImage: {
              'accent-grad': 'linear-gradient(90deg, #8b5cf6 0%, #22d3ee 100%)',
            },
            animation: {
              'mesh-drift-1': 'meshDrift1 30s ease-in-out infinite',
              'mesh-drift-2': 'meshDrift2 38s ease-in-out infinite',
              'mesh-drift-3': 'meshDrift3 44s ease-in-out infinite',
              marquee: 'marquee 40s linear infinite',
              'marquee-reverse': 'marqueeReverse 50s linear infinite',
            },
            keyframes: {
              meshDrift1: {
                '0%, 100%': { transform: 'translate3d(-10%, -10%, 0) scale(1)' },
                '50%': { transform: 'translate3d(10%, 5%, 0) scale(1.15)' },
              },
              meshDrift2: {
                '0%, 100%': { transform: 'translate3d(20%, 10%, 0) scale(1.1)' },
                '50%': { transform: 'translate3d(-15%, -5%, 0) scale(1)' },
              },
              meshDrift3: {
                '0%, 100%': { transform: 'translate3d(0, 20%, 0) scale(1)' },
                '50%': { transform: 'translate3d(5%, -10%, 0) scale(1.2)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              marqueeReverse: {
                '0%': { transform: 'translateX(-50%)' },
                '100%': { transform: 'translateX(0)' },
              },
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
      <div class="container">
        <div class="nav-brand">
          <a href="#home"></a>
        </div>
        <button class="nav-toggle" id="navToggle">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <ul class="nav-menu" id="navMenu">
          <!-- Navigation items will be loaded dynamically -->
        </ul>
      </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
      <div class="container">
        <div class="hero-content">
          <h1 class="hero-title">
            <span id="heroGreeting"></span> <span class="highlight" id="heroName"></span>
          </h1>
          <h2 class="hero-subtitle" id="heroTitle"></h2>
          <p class="hero-description" id="heroSummary"></p>
          <div class="hero-highlights" id="heroHighlights">
            <!-- Highlights will be loaded dynamically -->
          </div>
          <div class="hero-cta" id="heroCTA">
            <!-- CTA buttons will be loaded dynamically -->
          </div>
          <div class="social-links" id="heroSocial">
            <!-- Social links will be loaded dynamically -->
          </div>
        </div>
      </div>
    </section>

    <!-- About Section -->
    <section id="about" class="about">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="about-content">
          <div class="about-text" id="aboutText">
            <!-- Paragraphs will be loaded dynamically -->
          </div>
          <div class="about-stats" id="aboutStats">
            <!-- Statistics will be loaded dynamically -->
          </div>
        </div>
      </div>
    </section>

    <!-- Experience Section -->
    <section id="experience" class="experience">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="timeline" id="experienceTimeline">
          <!-- Experience items will be loaded dynamically -->
        </div>
      </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="skills">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="skills-grid" id="skillsGrid">
          <!-- Skills will be loaded dynamically -->
        </div>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="projects">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="projects-grid" id="projectsGrid">
          <!-- Projects will be loaded dynamically -->
        </div>
      </div>
    </section>

    <!-- Education Section -->
    <section id="education" class="education">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="education-content">
          <div class="education-grid" id="educationGrid">
            <!-- Education items will be loaded dynamically -->
          </div>
          <div class="certifications">
            <h3></h3>
            <div class="cert-grid" id="certGrid">
              <!-- Certifications will be loaded dynamically -->
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact">
      <div class="container">
        <h2 class="section-title"></h2>
        <div class="contact-content">
          <div class="contact-info" id="contactInfo">
            <!-- Contact info will be loaded dynamically -->
          </div>
          <div class="contact-form-container" id="contactFormContainer">
            <!-- Contact form will be loaded dynamically -->
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p id="footerCopyright"></p>
        <div class="footer-links" id="footerLinks">
          <!-- Footer links will be loaded dynamically -->
        </div>
      </div>
    </footer>

    <script src="assets/js/main.js"></script>
  </body>
</html>
